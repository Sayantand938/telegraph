name: telegraph
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.0
  sqflite_common_ffi: ^2.4.0+2
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_markdown_plus: ^1.0.7
  intl: ^0.20.2
  markdown: ^7.3.0
  provider: ^6.1.5+1
  http: ^1.6.0
  shared_preferences: ^2.5.4




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # Register your image and sound assets here
  assets:
    - assets/images/avatar.png
    - assets/images/chat_bg.png
    - assets/sounds/sent.mp3     # Added sent tick sound
    - assets/sounds/received.mp3 # Added received tick sound

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.otf
          weight: 700